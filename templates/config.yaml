# 翻译项目配置模板
# 复制到项目根目录并根据实际情况修改
# 或使用: python scripts/translate.py init <project-name>

# 项目元信息
project:
  name: "project-name"
  title: "Original Title"
  title_translated: "翻译标题"
  author: "Author Name"
  license: "CC-BY-SA-3.0"
  version: "1.0"

# 原文配置
source:
  type: latex                    # latex | markdown | word | rst | html
  upstream: "https://github.com/xxx/yyy.git"
  branch: master
  sync_strategy: subtree         # subtree | submodule | manual

# 翻译配置
translation:
  target_language: zh-CN         # BCP 47 语言代码
  engine: xelatex                # 构建引擎 (latex 项目)
  font_family:
    main: "Noto Serif CJK SC"
    sans: "Noto Sans CJK SC"
    mono: "Noto Sans Mono CJK SC"

# 领域配置（决定加载哪些翻译规则）
# 可选值: technical, academic, literary（可多选）
# 加载顺序: global.md → 各领域规则 → 项目 terms.yaml
domains:
  - technical                    # 技术文档规则

# 文件格式处理
formats:
  latex:
    translate: [prose, captions, titles, quiz]
    preserve: [code, labels, cites, refs, math]
  markdown:
    translate: [prose, headings]
    preserve: [code, links, images]
  word:
    translate: [body, captions]
    preserve: [code, fields]

# 术语表
terminology:
  file: terms.yaml
  auto_check: true
  strict_mode: false

# 质量门禁
quality:
  min_score: 3.5
  checks:
    - terminology_consistency
    - untranslated_detection
    - build_success

# 构建配置
# command: 自定义构建命令（留空则使用默认命令）
# 默认命令根据 source.type 自动选择：
#   latex → make 1c
#   markdown → pandoc -o output.md
#   word → echo "请手动构建"
build:
  command: ""                      # 自定义命令，如 "make 1c"、"pandoc -o book.pdf"
  targets: [pdf]
  output_suffix: "_{lang}"
