# translate-engine 自身的测试和 lint
name: Engine Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyyaml ruff

      - name: Run ruff
        run: ruff check scripts/

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Test check_terms.py --help
        run: python scripts/check_terms.py --help

      - name: Test translate.py --help
        run: python scripts/translate.py --help

      - name: Test translate.py list
        run: python scripts/translate.py list
