# 通用翻译项目构建工作流
# 复制到翻译项目的 .github/workflows/ 目录

name: Build & Quality Check

on:
  push:
    branches: [main, master, zh-cn]
  pull_request:
    branches: [main, master, zh-cn]
  workflow_dispatch:

env:
  TERM_CHECK: true

jobs:
  # 质量检查
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout translate-engine
        uses: actions/checkout@v4
        with:
          repository: your-org/translate-engine
          path: .translate-engine
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check terminology consistency
        run: python .translate-engine/scripts/check_terms.py --config config.yaml --terms terms.yaml
        continue-on-error: true

      - name: Check translation progress
        run: python .translate-engine/scripts/check_progress.py --config config.yaml
        continue-on-error: true

  # 构建
  build:
    name: Build PDF
    needs: quality
    runs-on: ubuntu-latest
    container:
      image: akiyks/perfbook-build:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install additional dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            latexpand poppler-utils \
            texlive-xetex fonts-noto-cjk tex-gyre

      - name: Install steel-city-comic font
        run: |
          mkdir -p /usr/local/share/fonts/
          cp fonts/steel-city-comic.regular.ttf /usr/local/share/fonts/ 2>/dev/null || true

      - name: Build code samples
        run: |
          make -C CodeSamples/ pthreads 2>/dev/null || true
          make -C CodeSamples/ 2>/dev/null || true

      - name: Build all PDF variants
        run: |
          make perfbook.pdf
          make perfbook-1c.pdf
          make perfbook-a4.pdf
        continue-on-error: true

      - name: Rename PDFs with language suffix
        run: |
          for f in perfbook*.pdf; do
            [ -f "$f" ] && mv "$f" "${f%.pdf}_cn.pdf"
          done

      - name: Verify PDFs
        run: |
          echo "=== Built PDFs ==="
          ls -lh *.pdf 2>/dev/null || echo "No PDFs found"
          for f in *_cn.pdf; do
            [ -f "$f" ] && pages=$(pdfinfo "$f" 2>/dev/null | grep Pages | awk '{print $2}') && echo "$f: $pages pages"
          done

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: translation-pdfs
          path: "*_cn.pdf"
          retention-days: 30

  # Release (仅 tag 触发)
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: translation-pdfs

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.pdf"
          generate_release_notes: true
