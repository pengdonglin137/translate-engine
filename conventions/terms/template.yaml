# 术语表模板
# 根据项目类型选择合适的模板

version: "1.0"
language: zh-CN

# 术语映射
terms:
  # ===== 技术文档通用术语 =====
  - en: "lock"
    zh: "锁"
    context: "同步原语"
    first_occurrence: "锁（lock）"

  - en: "deadlock"
    zh: "死锁"

  - en: "livelock"
    zh: "活锁"

  - en: "starvation"
    zh: "饥饿"

  - en: "data race"
    zh: "数据竞争"

  - en: "memory barrier"
    zh: "内存屏障"

  - en: "memory ordering"
    zh: "内存排序"

  - en: "hazard pointer"
    zh: "风险指针"

  - en: "reference counting"
    zh: "引用计数"

  - en: "sequence lock"
    zh: "顺序锁"

  - en: "per-thread"
    zh: "每线程"

  - en: "per-CPU"
    zh: "per-CPU"
    rule: "keep_english"

  - en: "fastpath"
    zh: "快速路径"

  # ===== 保留英文的术语 =====
  - en: "RCU"
    zh: "RCU"
    rule: "keep_english"

  - en: "grace period"
    zh: "grace period"
    rule: "keep_english"

  - en: "cache line"
    zh: "cache line"
    rule: "keep_english"

  - en: "thread"
    zh: "thread"
    rule: "keep_english"

  - en: "CPU"
    zh: "CPU"
    rule: "keep_english"

  - en: "GPU"
    zh: "GPU"
    rule: "keep_english"

  # ===== 视上下文决定的术语 =====
  - en: "thread"
    zh: "线程"
    rule: "context_dependent"
    contexts:
      - pattern: "per-thread"
        zh: "每线程"
      - pattern: "thread pool"
        zh: "线程池"
      - default: true
        zh: "thread"

# 术语检查规则
rules:
  strict: false
  warn_on_mismatch: true
  check_in_code: false
  check_in_labels: false
  check_in_citations: false
